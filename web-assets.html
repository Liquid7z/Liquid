<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Web Animation Assets</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

/* BASE */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle at 20% 20%, #00d9ff15, transparent),
radial-gradient(circle at 80% 80%, #00ffa215, transparent),
#0f0f0f;

color:white;
}

/* HEADER */

header{
text-align:center;
padding:80px 20px;
}

header h1{
font-family:'Orbitron';
font-size:48px;

background:linear-gradient(90deg,#00d9ff,#00ffa2);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */

.assets{
padding:80px 12%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:50px;
align-items:start;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.12);
overflow:hidden;

transition:transform .35s ease, box-shadow .35s ease;
cursor:pointer;
position:relative;
}

.card:hover{
transform:translateY(-18px) scale(1.25);
z-index:20;
box-shadow:0 50px 180px rgba(0,217,255,0.45);
}

/* MEDIA */

.media{
position:relative;
overflow:hidden;
}

.media img,
.media video{
width:100%;
height:180px;
object-fit:cover;
transition:transform .6s ease;
}

/* ZOOM */

.card:hover img,
.card:hover video{
transform:scale(1.15);
}

/* PREVIEW TAG */

.preview{
position:absolute;
bottom:10px;
right:10px;

background:rgba(0,0,0,0.6);
padding:6px 10px;

font-size:12px;
border-radius:6px;

color:#00d9ff;

opacity:0;
transition:.3s;
}

.card:hover .preview{
opacity:1;
}

/* CONTENT */

.card-content{
padding:18px;
}

.card-content h3{
color:#00d9ff;
margin-bottom:6px;
}

.card-content p{
font-size:13px;
color:#aaa;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

align-items:center;
justify-content:center;

z-index:1000;
}

/* MODAL BOX */

.modal-content{

max-width:1000px;
width:90%;

background:#111;

border-radius:12px;

padding:25px;

position:relative;

}

/* GRID */

.modal-grid{

display:grid;
grid-template-columns:1.2fr 1fr;

gap:30px;
align-items:center;

}

/* MEDIA */

.modal-preview video,
.modal-preview img{
width:100%;
border-radius:10px;
}

/* INFO */

.modal-info h2{
color:#00d9ff;
margin-bottom:10px;
}

.modal-info p{
color:#bbb;
line-height:1.6;
}

/* TAGS */

.tags{
display:flex;
gap:8px;
flex-wrap:wrap;
margin:10px 0;
}

.tag{
background:#00d9ff22;
border:1px solid #00d9ff;
padding:4px 10px;
border-radius:6px;
font-size:12px;
}

/* CLOSE */

.close{
position:absolute;
top:15px;
right:20px;

font-size:22px;
cursor:pointer;
color:#00d9ff;
}

footer{
text-align:center;
padding:60px;
color:#777;
}

</style>
</head>

<body>

<header>
<h1>Web Animation Assets</h1>
</header>

<section class="assets">

<!-- CARD -->

<div class="card"
onclick="openModal(
'Scroll Animation',
['HTML','CSS','JS'],
'GSAP scroll animation that reveals elements while scrolling.',
'bg.mp4',
'video'
)">

<div class="media">

<video muted loop>
<source src="bg.mp4">
</video>

<div class="preview">Preview</div>

</div>

<div class="card-content">

<h3>Scroll Animation</h3>
<p>GSAP scroll animation asset.</p>

</div>

</div>


<!-- CARD -->

<div class="card"
onclick="openModal(
'Liquid Glass UI',
['HTML','CSS'],
'Apple VisionOS inspired glass UI component.',
'images/glass.jpg',
'image'
)">

<div class="media">
<img src="images/glass.jpg">
<div class="preview">Preview</div>
</div>

<div class="card-content">
<h3>Liquid Glass UI</h3>
<p>VisionOS glass style interface.</p>
</div>

</div>

</section>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✕</span>

<div class="modal-grid">

<div class="modal-preview" id="modalMedia"></div>

<div class="modal-info">

<h2 id="modalTitle"></h2>

<div class="tags" id="modalTags"></div>

<p id="modalDesc"></p>

</div>

</div>

</div>

</div>

<footer>
© 2026 Liquid
</footer>

<script>

/* VIDEO PREVIEW */

document.querySelectorAll("video").forEach(v=>{
v.addEventListener("mouseenter",()=>v.play())
v.addEventListener("mouseleave",()=>{
v.pause()
v.currentTime=0
})
})

/* MODAL */

function openModal(title,tags,desc,src,type){

const modal=document.getElementById("modal")
const media=document.getElementById("modalMedia")

document.getElementById("modalTitle").innerText=title
document.getElementById("modalDesc").innerText=desc

const tagBox=document.getElementById("modalTags")
tagBox.innerHTML=""

tags.forEach(t=>{
tagBox.innerHTML+=`<span class="tag">${t}</span>`
})

if(type==="video"){

media.innerHTML=`
<video controls autoplay>
<source src="${src}">
</video>`

}else{

media.innerHTML=`<img src="${src}">`

}

modal.style.display="flex"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
