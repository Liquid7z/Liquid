<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Powered by Liquid</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* GRID BACKGROUND */

.grid-bg{
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:60px 60px;
z-index:-2;
}

/* PARTICLES */

.particle{
position:fixed;
width:6px;
height:6px;
background:#00d9ff;
border-radius:50%;
opacity:0.6;
z-index:-1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:70px;
opacity:0;
transform:translateY(80px);
background:linear-gradient(90deg,#00d9ff,#00ffa2);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:20px;
opacity:0;
transform:translateY(60px);
color:#aaa;
}

/* CARDS */

.section{
padding:120px 10%;
display:flex;
justify-content:center;
}

.cards{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:280px;
padding:35px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border-radius:14px;

border:1px solid rgba(255,255,255,0.15);

text-align:center;
text-decoration:none;
color:white;
font-size:20px;

opacity:0;
transform:translateY(80px);

transition:0.4s;
}

/* Liquid Glow */

.card:hover{

transform:scale(1.08);

background:rgba(255,255,255,0.08);

box-shadow:
0 0 20px rgba(0,217,255,0.4),
0 0 50px rgba(0,217,255,0.2);

}

/* IMAGE */

.image-section{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.image-section img{
width:520px;
border-radius:12px;
transform:scale(0.7);
opacity:0;
}

/* END */

.end{
height:40vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.end h1{
font-size:32px;
opacity:0;
transform:translateY(80px);
}

.end p{
margin-top:10px;
opacity:0;
transform:translateY(60px);
color:#aaa;
}

.parallax-layer{
position:relative;
transition:transform 0.2s;
}

/* <!-- 3D BACKGROUND LAYER --> */
.bg-3d{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center, #00d9ff33, transparent 60%);
z-index:-3;
transition:background-position 0.2s;
}

.cursor-glow{
position:fixed;
width:250px;
height:250px;

background:radial-gradient(circle,
rgba(0,217,255,0.3) 0%,
rgba(0,217,255,0.15) 30%,
transparent 70%);

border-radius:50%;
pointer-events:none;

transform:translate(-50%, -50%);
z-index:-1;
}
#three-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-5;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-4;
}

.code-symbols{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.code-symbols span{
position:absolute;
font-size:30px;
color:#00d9ff;
opacity:0.6;
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
<canvas id="particles"></canvas>
<div id="three-bg"></div>
<div class="grid-bg"></div>

<!-- PARTICLES -->
<div class="particle" style="top:20%;left:10%"></div>
<div class="particle" style="top:60%;left:30%"></div>
<div class="particle" style="top:40%;left:80%"></div>
<div class="particle" style="top:70%;left:60%"></div>
<div class="particle" style="top:30%;left:50%"></div>
<div class="bg-3d"></div>
<section class="hero">
<div class="code-symbols">
<span>{ }</span>
<span>&lt;/&gt;</span>
<span>( )</span>
<span>#</span>
</div>
<div class="parallax-layer title-layer">
<h1 class="hero-title">Powered by Liquid</h1>
</div>

<div class="parallax-layer sub-layer">
<p class="hero-sub">Where Motion Meets the Webpage</p>
</div>

</section>



<section class="section">

<div class="cards">

<a href="portfolio.html" class="card">My Portfolio</a>
<a href="projects.html" class="card">Projects</a>
<a href="#" class="card">Assets</a>
<a href="#" class="card">Gallery</a>

</div>

</section>


<section class="image-section">

<!-- <img src="https://vui.unsplash.com/resize?height=256&quality=60&type=auto&url=https%3A%2F%2Fsearched-images.s3.us-west-2.amazonaws.com%2Fed1768a4-abb3-4027-b49b-4947acc482c2%3FX-Amz-Algorithm%3DAWS4-HMAC-SHA256%26X-Amz-Credential%3DAKIAQ4GRIA4QTG2PSHUB%252F20260311%252Fus-west-2%252Fs3%252Faws4_request%26X-Amz-Date%3D20260311T173436Z%26X-Amz-Expires%3D86400%26X-Amz-SignedHeaders%3Dhost%26X-Amz-Signature%3D28d8361ef57cc74b0bfcb12e9226b0d6ba3220f4d1efb5459ab6749829d35f46&sign=UU6VGiHMOGqa_heyxCAbIfTGBNNLSyGCdGm85UKqBAE" alt="MSI Gaming Laptop"> -->

</section>


<section class="end">

<h1 class="end-title">Powered by Liquid</h1>
<p class="end-sub">Smooth cinematic scroll experience</p>

</section>


<script>

gsap.registerPlugin(ScrollTrigger);

/* HERO */

gsap.to(".hero-title",{
opacity:1,
y:0,
duration:1.2
});

gsap.to(".hero-sub",{
opacity:1,
y:0,
duration:1.2,
delay:0.4
});

/* CARDS REVEAL */

gsap.to(".card",{
scrollTrigger:{
trigger:".cards",
start:"top 80%"
},
opacity:1,
y:0,
duration:1,
stagger:0.2
});

/* IMAGE ZOOM */

gsap.to(".image-section img",{
scrollTrigger:{
trigger:".image-section",
start:"top 80%"
},
scale:1,
opacity:1,
duration:1.5
});

/* END SECTION */

gsap.to(".end-title",{
scrollTrigger:{
trigger:".end",
start:"top 80%"
},
opacity:1,
y:0,
duration:1.2
});

gsap.to(".end-sub",{
scrollTrigger:{
trigger:".end",
start:"top 80%"
},
opacity:1,
y:0,
duration:1.2,
delay:0.3
});

/* FLOATING PARTICLES */

gsap.to(".particle",{
y:-40,
duration:4,
repeat:-1,
yoyo:true,
stagger:0.6
});

const layers = document.querySelectorAll(".parallax-layer");

document.addEventListener("mousemove", (e) => {

let x = (window.innerWidth / 2 - e.clientX) / 25;
let y = (window.innerHeight / 2 - e.clientY) / 25;

layers.forEach(layer => {

let speed = layer.classList.contains("title-layer") ? 1.5 : 1;

layer.style.transform = `translate(${x * speed}px, ${y * speed}px)`;

});

});

document.addEventListener("mousemove", e => {

const x = e.clientX / window.innerWidth * 100;
const y = e.clientY / window.innerHeight * 100;

document.querySelector(".bg-3d").style.background =
`radial-gradient(circle at ${x}% ${y}%, #00d9ff33, transparent 60%)`;

});

const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e=>{

glow.style.left = e.clientX + "px";
glow.style.top = e.clientY + "px";

});
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);

document.getElementById("three-bg").appendChild(renderer.domElement);


/* LIGHT */

const light = new THREE.PointLight(0x00d9ff, 2);
light.position.set(5,5,5);
scene.add(light);


/* FLOATING OBJECTS */

const objects = [];

for(let i=0;i<20;i++){

const geometry = new THREE.IcosahedronGeometry(0.5,0);

const material = new THREE.MeshStandardMaterial({
color:0x00d9ff,
wireframe:true
});

const mesh = new THREE.Mesh(geometry,material);

mesh.position.x = (Math.random()-0.5)*10;
mesh.position.y = (Math.random()-0.5)*10;
mesh.position.z = (Math.random()-0.5)*10;

scene.add(mesh);

objects.push(mesh);

}

camera.position.z = 5;


/* ANIMATION LOOP */

function animate(){

requestAnimationFrame(animate);

objects.forEach(obj=>{
obj.rotation.x += 0.003;
obj.rotation.y += 0.003;
});

renderer.render(scene,camera);

}

animate();

document.addEventListener("mousemove", e=>{

const x = (e.clientX / window.innerWidth - 0.5)*2;
const y = (e.clientY / window.innerHeight - 0.5)*2;

camera.position.x = x;
camera.position.y = -y;

});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
});
}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00d9ff";
ctx.fill();
});

requestAnimationFrame(animateParticles);
}

animateParticles();


document.querySelectorAll(".code-symbols span").forEach(el=>{

el.style.left = Math.random()*100+"%";
el.style.top = Math.random()*100+"%";

gsap.to(el,{
y:-80,
repeat:-1,
yoyo:true,
duration:3 + Math.random()*3
});

});

</script>
<div class="cursor-glow"></div>
</body>
</html>
